name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write # required for OIDC -> AWS role assumption
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Build static site
        env:
          BUCKET_NAME: ${{ vars.BUCKET_NAME }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          PHOTOS_PREFIX: ${{ vars.PHOTOS_PREFIX }}
          PUBLIC_URL_BASE: ${{ vars.PUBLIC_URL_BASE }}
        run: npm run build

      # --exclude keeps this sync scoped to the site files: it never touches
      # (and, crucially, never --delete's) anything under the photos/ prefix.
      - name: Sync to S3
        run: aws s3 sync ./dist "s3://${{ vars.BUCKET_NAME }}" --delete --exclude "${{ vars.PHOTOS_PREFIX || 'photos/' }}*"

      - name: Invalidate CloudFront cache
        if: vars.CLOUDFRONT_DISTRIBUTION_ID != ''
        run: aws cloudfront create-invalidation --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" --paths "/*"
